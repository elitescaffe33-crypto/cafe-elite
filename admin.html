<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAFE ELITE Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="CAFE ELITE home">
        <span class="brand-mark">CE</span>
        <span>
          <strong>CAFE ELITE</strong>
          <small>Admin</small>
        </span>
      </a>
      <nav class="site-nav is-admin-nav" aria-label="Admin navigation">
        <a href="index.html">Website</a>
        <a href="#settings">Settings</a>
        <a href="#prices">Prices</a>
        <a href="#orders">Orders</a>
        <a href="#customers">Customers</a>
      </nav>
    </header>

    <main class="admin-page">
      <section class="section admin-hero">
        <p class="eyebrow">Admin panel</p>
        <h1>Settings</h1>
        <p>Manage opening hours, order options and recent order history.</p>
      </section>

      <section class="section admin-login" id="loginPanel">
        <div class="order-panel">
          <h2>Login</h2>
          <label>
            Admin password
            <input id="adminPassword" type="password" autocomplete="current-password" />
          </label>
          <button class="button primary" id="loginButton" type="button">Open admin</button>
          <p id="adminMessage" class="admin-message"></p>
        </div>
      </section>

      <section class="section admin-dashboard" id="adminDashboard" hidden>
        <div class="admin-grid">
          <form class="order-panel" id="settingsForm">
            <div class="section-heading compact">
              <p class="eyebrow">Order controls</p>
              <h2 id="settings">Site settings</h2>
            </div>

            <div class="admin-switches">
              <label><input name="orderingEnabled" type="checkbox" /> Online ordering</label>
              <label><input name="collection" type="checkbox" /> Collection</label>
              <label><input name="delivery" type="checkbox" /> Delivery</label>
              <label><input name="payOnCollection" type="checkbox" /> Pay on collection</label>
              <label><input name="stripe" type="checkbox" /> Stripe online payment</label>
            </div>

            <div class="hours-table" id="hoursTable"></div>

            <button class="button primary" type="submit">Save settings</button>
          </form>

          <form class="order-panel" id="pricesForm">
            <div class="section-heading compact">
              <p class="eyebrow">Menu controls</p>
              <h2 id="prices">Menu prices</h2>
            </div>
            <div class="price-editor" id="priceEditor"></div>
            <button class="button primary" type="submit">Save prices</button>
          </form>

          <section class="order-panel" id="orders">
            <div class="section-heading compact">
              <p class="eyebrow">Recent orders</p>
              <h2>Order history</h2>
            </div>
            <button class="button secondary" id="refreshOrders" type="button">Refresh orders</button>
            <div class="orders-list" id="ordersList"></div>
          </section>

          <section class="order-panel" id="customers">
            <div class="section-heading compact">
              <p class="eyebrow">Customer list</p>
              <h2>Contacts</h2>
            </div>
            <div class="order-tools">
              <button class="button secondary" id="refreshContacts" type="button">Refresh contacts</button>
              <button class="button secondary" id="copyContacts" type="button">Copy CSV</button>
            </div>
            <div class="contacts-list" id="contactsList"></div>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="admin.js"></script>
  </body>
</html>
